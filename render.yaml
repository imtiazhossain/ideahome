# IdeaHome – Render Blueprint
# Deploy: connect this repo in Render Dashboard → New → Blueprint → select render.yaml
# App: https://ideahome-web.onrender.com  API: https://ideahome-api.onrender.com

databases:
  - name: ideahome-db
    plan: free

services:
  - type: web
    runtime: node
    name: ideahome-api
    rootDir: backend
    plan: free
    # Avoid installing Playwright/Jest (saves ~1GB+); only add build-time deps.
    buildCommand: "npm install --omit=dev && npm install prisma typescript --no-save && npx prisma generate && npm run build"
    startCommand: "npx prisma migrate deploy && npm start"
    healthCheckPath: /
    envVars:
      - key: NODE_OPTIONS
        value: "--max-old-space-size=4096"
      - key: DATABASE_URL
        fromDatabase:
          name: ideahome-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    runtime: node
    name: ideahome-web
    rootDir: web
    plan: free
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: BACKEND_URL
        value: "https://ideahome-api.onrender.com"
      - key: NEXT_PUBLIC_API_URL
        value: "https://ideahome-api.onrender.com"
